<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TripClip — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="options-app">
    <h1>✈ TripClip Settings</h1>

    <section class="setting-group">
      <label for="api-key">OpenAI API Key</label>
      <div class="input-row">
        <input
          type="password"
          id="api-key"
          placeholder="sk-..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="toggle-visibility" type="button" title="Show / hide key">👁</button>
      </div>
      <p class="hint">
        Your key is stored only in this extension's local storage and is never sent anywhere
        except directly to the OpenAI API.
      </p>
    </section>

    <div class="actions">
      <button id="save-btn">Save</button>
      <span id="save-status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
